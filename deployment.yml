apiVersion: apps/v1
kind: Deployment
metadata:
  name: agrdeploy
  labels:
    app: agrapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agrapp
  template:
    metadata:
      labels:
        app: agrapp
    spec:
      containers:
        - name: agrcontainer
          image: surya8442/agriculture:latest
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: agr-service
spec:
  type: NodePort
  selector:
    app: agrapp
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30458
      
