apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploytes 
  labels:
    app: tes
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tes
  template:
    metadata:
      labels:
        app: tes
    spec:
      containers:
        - name: tescontainer
          image: shivadocker2997/tesportfolio:TES
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: tes-service
spec:
  type: NodePort
  selector:
    app: tes
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 32323
      
